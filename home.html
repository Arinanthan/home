<!DOCTYPE html>
<html>
<head>
<title>WIP Stock Report</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
padding:20px;
margin:0;
background:linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') no-repeat center center/cover;
color:white;
}

.container{
background:rgba(0,0,0,0.65);
padding:30px;
width:450px;
border-radius:10px;
margin:auto;
margin-top:60px;
}

h2{
text-align:center;
margin-bottom:25px;
}

button{
padding:8px 15px;
margin:5px;
cursor:pointer;
border:none;
border-radius:5px;
background:#1abc9c;
color:white;
}

button:hover{
background:#16a085;
}

#progressContainer{
width:100%;
border:1px solid #ccc;
height:20px;
margin-top:10px;
background:white;
}

#progressBar{
height:20px;
width:0%;
background:green;
}

</style>
</head>

<body>

<div class="container">

<h2>WIP Stock Auto Report</h2>

<label>Upload Manufacturing File:</label><br>
<input type="file" id="mfgFile"><br><br>

<label>Upload Rejection File:</label><br>
<input type="file" id="rejFile"><br><br>

<button onclick="processFiles()">Generate WIP Report</button>

<button id="downloadBtn" onclick="downloadExcel()" disabled>
Download Excel Report
</button>

<br><br>

<div id="progressContainer">
<div id="progressBar"></div>
</div>

<p id="progressText">Progress: 0%</p>

</div>

<script>

let finalData=[];
let summaryData=[];
let currentProgress=0;

function animateProgress(target,text){

let interval=setInterval(function(){

if(currentProgress>=target){
clearInterval(interval);
}else{
currentProgress++;
document.getElementById("progressBar").style.width=currentProgress+"%";
document.getElementById("progressText").innerText=text+" "+currentProgress+"%";
}

},15);

}

function readExcel(file,callback){

let reader=new FileReader();

reader.onload=function(e){

let data=new Uint8Array(e.target.result);
let workbook=XLSX.read(data,{type:'array'});
let sheet=workbook.Sheets[workbook.SheetNames[0]];
let json=XLSX.utils.sheet_to_json(sheet);

callback(json);

};

reader.readAsArrayBuffer(file);

}

function processFiles(){

let mfgFile=document.getElementById("mfgFile").files[0];
let rejFile=document.getElementById("rejFile").files[0];

if(!mfgFile || !rejFile){
alert("Please upload both files");
return;
}

currentProgress=0;
animateProgress(5,"Reading Files");

document.getElementById("downloadBtn").disabled=true;

readExcel(mfgFile,function(mfgData){

animateProgress(20,"Reading Rejection");

readExcel(rejFile,function(rejData){

calculate(mfgData,rejData);

});

});

}

function calculate(mfgData,rejData){

finalData=[];
summaryData=[];
let prevQty={};

mfgData.sort((a,b)=>
(a["Order no."]||"").toString().localeCompare((b["Order no."]||"").toString())||
(a["Level/Part number"]||"").toString().localeCompare((b["Level/Part number"]||"").toString())||
(a["Op."]-b["Op."])
);

let total=mfgData.length;
let count=0;

mfgData.forEach(row=>{

count++;

let rawPart=(row["Level/Part number"]||"").toString().trim();

if(!rawPart || rawPart==="0-0") return;

let partNo=rawPart.replace(/^0-0\s*/,"").trim();
let orderNo=(row["Order no."]||"").toString().trim();
let workCenter=(row["WC"]||"").toString().trim();
let opNo=row["Op."];

let rejectionRow=rejData.find(r=>{

let rejPart=(r["Part number"]||"").toString().replace(/^0-0\s*/,"").trim();

return (r["M-order"]||"").toString().trim()===orderNo &&
(r["Op."]||"")===opNo &&
rejPart===partNo;

});

let rejection=rejectionRow ? (rejectionRow["Rejected qty"]||0) : 0;

let reportQty=row["Rep. qty"]||0;
let finalQty=reportQty+rejection;

let key=`${orderNo}_${partNo}`;

let previous=prevQty[key]||0;

let wip=previous-finalQty;

if(wip<0) wip=0;

prevQty[key]=finalQty;

if(wip>0){

finalData.push({

"Order No":orderNo,
"Op No":opNo,
"Part Number":partNo,
"Work Center":workCenter,
"WIP Stock":wip

});

let existing=summaryData.find(s=>s["Part Number"]===partNo && s["Work Center"]===workCenter);

if(existing){
existing["Total WIP Qty"]+=wip;
}else{

summaryData.push({

"Part Number":partNo,
"Work Center":workCenter,
"Total WIP Qty":wip

});

}

}

let percent=30+Math.floor((count/total)*70);

animateProgress(percent,"Processing WIP");

});

animateProgress(100,"Completed");

document.getElementById("downloadBtn").disabled=false;

alert("WIP Report Generated Successfully!");

}

function generatePivotWIP(finalData){

let pivotMap={};
let workCenters=new Set();

finalData.forEach(r=>{

workCenters.add(r["Work Center"]);

let key=r["Part Number"]+"||"+r["Work Center"];

pivotMap[key]=(pivotMap[key]||0)+r["WIP Stock"];

});

workCenters=Array.from(workCenters).sort();

let partNumbers=[...new Set(finalData.map(r=>r["Part Number"]))].sort();

let pivotArray=[["Part Number",...workCenters]];

partNumbers.forEach(pn=>{

let row=[pn];

workCenters.forEach(wc=>{

let val=pivotMap[pn+"||"+wc]||"";

row.push(val);

});

pivotArray.push(row);

});

return pivotArray;

}

function downloadExcel(){

if(finalData.length===0){

alert("No data to export!");

return;

}

let workbook=XLSX.utils.book_new();

XLSX.utils.book_append_sheet(workbook,XLSX.utils.json_to_sheet(finalData),"WIP_Details");

XLSX.utils.book_append_sheet(workbook,XLSX.utils.json_to_sheet(summaryData),"Summary_Part_WC");

XLSX.utils.book_append_sheet(workbook,XLSX.utils.aoa_to_sheet(generatePivotWIP(finalData)),"Pivot_WIP");

XLSX.writeFile(workbook,"WIP_Stock_Report.xlsx");

}

</script>

</body>
</html>
